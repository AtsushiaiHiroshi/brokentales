<form class="sheet item" autocomplete="off">
  <header class="sheet-header">
    <div class="header-fields">
      <h1 class="itemname">
        <input name="name" type="text" value="{{item.name}}" placeholder="{{localize 'BROKENTALES.Fields.Name'}}" />
      </h1>
    </div>
  </header>

  <section class="sheet-body">
    <div class="grid-container">

      <!-- Description -->
      <div class="resource full-width">
        <label>{{localize "BROKENTALES.Fields.Description"}}</label>
        <textarea name="system.description">{{system.description}}</textarea>
      </div>

      <!-- Type -->
      <div class="resource">
        <label>Type</label>
        <select name="system.type">
          <option value="narrative" {{#if (eq system.type "narrative")}}selected{{/if}}>Narrative</option>
          <option value="mechanical" {{#if (eq system.type "mechanical")}}selected{{/if}}>Mechanical</option>
        </select>
      </div>

    </div>
  </section>
</form>
